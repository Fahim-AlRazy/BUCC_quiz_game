<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Game</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="timer-display" class="timer-display"><span id="timer">0:30</span></div>
  <div id="top-section" class="top-section visible">
    <img src="img/logo.png" alt="Logo" id="top-logo" class="screen-logo visible">
    <p id="event-text" class="event-text visible">Club Fair Spring_26</p>
  </div>
  <div class="container">
    <div class="screen active" id="start-screen">
      <h1>Welcome To BUCC</h1>
      <p>Test your knowledge with these fun questions</p>
      <button id="start-btn">Start Quiz</button>
    </div>

    <div class="screen" id="subject-screen">
      <h1>Choose a Subject</h1>
      <div class="subject-container">
        <button class="subject-btn" data-subject="java">Java</button>
        <button class="subject-btn" data-subject="gk">General Knowledge</button>
        <button class="subject-btn" data-subject="math">Math</button>
        <button class="subject-btn" data-subject="science">Science</button>
      </div>

      <button id="subject-abort-btn" class="abort-btn">Abort</button>
    </div>

    <div class="screen" id="quiz-screen">
      <div class="quiz-header">
        <h2 id="question-text">Question goes here</h2>
        <div class="quiz-info">
          <p>
            Question <span id="current-question">1</span> of <span id="total-questions">5</span>
          </p>

          <p>Score: <span id="score">0</span></p>
        </div>
      </div>

      <div id="answers-container" class="answers-container">
      </div>

      <div class="progress-bar">
        <div id="progress" class="progress"></div>
      </div>

      <button id="abort-btn" class="abort-btn">Abort</button>
    </div>

    <div id="result-screen" class="screen">
      <h1>Quiz Results</h1>
      <div class="result-info">
        <p>You scored <span id="final-score">0</span> out of <span id="max-score">5</span></p>

        <div id="result-message">Good job!</div>
      </div>
      <button id="restart-btn">Restart Quiz</button>
    </div>
  </div>
  <img src="img/bucc_logo.png" alt="BUCC Logo" id="bottom-logo" class="screen-logo bucc-logo visible">

  <script src="script.js"></script>
</body>

</html>
